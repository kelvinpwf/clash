 # ========================
  # 0. 基础网络与局域网 (最高优先级)
  # ========================
  - DST-PORT,123,直连
  - GEOIP,LAN,直连,no-resolve
  - RULE-SET,Private,直连
  - RULE-SET,Hijacking,拒绝

  # ========================
  # 1. 个人自定义强制规则 (你的绝对特权！)
  # 必须放在各大厂规则前面，保证你随时可以手动“硬超车”
