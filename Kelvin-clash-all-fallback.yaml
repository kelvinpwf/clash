# ========================
# Kelvin Clash-ALL 旁路由优化版
# ========================

# ============================================
# ✈️ 机场顺位总控台 (想换主备机场，只需修改这里)
# ============================================
# 将你最想用的机场名字填入 Primary，剩下的填入 Backup
Anchor-Primary: &Primary [nice云]
Anchor-Backup: &Backup [PolYun,猫耳云]
proxy-providers:
  灵魂云:
    url: "https://kelvinpwfsubstore.tocmcc.cn:443/kelvinpwfkelvinpwfke/download/%E7%81%B5%E9%AD%82%E4%BA%91"
    type: http
    interval: 86400
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 180}
    proxy: 直连
  PolYun:
    url: "https://kelvinpwfsubstore.tocmcc.cn:443/kelvinpwfkelvinpwfke/download/PolYun"
    type: http
    interval: 86400
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 180}
    proxy: 直连
  猫耳云:
    url: "https://kelvinpwfsubstore.tocmcc.cn:443/kelvinpwfkelvinpwfke/download/%E7%8C%AB%E8%80%B3%E4%BA%91"
    type: http
    interval: 86400
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 180}
    proxy: 直连 
  nice云:
    url: "https://kelvinpwfsubstore.tocmcc.cn/kelvinpwfkelvinpwfke/download/nice%E4%BA%91"
    type: http
    interval: 86400
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 180}
    proxy: 直连

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}
  
# OpenClash 设置
sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
      - 443
    TLS:
      ports:
      - 443
      - 8443
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
  force-domain:
  - " .netflix.com"
  - "+.nflxvideo.net"
  - "+.amazonaws.com"
  - "+.media.dssott.com"
  skip-domain:
  - "+.apple.com"
  - Mijia Cloud
  - dlg.io.mi.com
  - "+.oray.com"
  - "+.sunlogin.net"
  - "+.push.apple.com"
  parse-pure-ip: true
  
# ========================
# 主要端口设置
# ========================
mixed-port: 7890
redir-port: 7892
tproxy-port: 7895

allow-lan: true
bind-address: '*'
mode: rule
log-level: warning          # 生产环境用 warning，减少日志噪音；调试时改回 info
find-process-mode: always   # 支持按进程名分流（借鉴 MihomoPro）
ipv6: false

tcp-concurrent: true
unified-delay: true  # 顺便加上这个，让测速显示的延迟更真实（去除握手时间）

external-controller: 127.0.0.1:9090
secret: "Kv@9x#mP2$wL7qR!"
external-ui: "/usr/share/openclash/ui"
external-ui-name: metacubexd
keep-alive-interval: 15
keep-alive-idle: 600

# 实验性功能（借鉴 MihomoPro）
# quic-go-disable-gso: 禁用 GSO 可提升 QUIC 在部分 Linux 内核上的稳定性
experimental:
  quic-go-disable-gso: true

# LAN 认证（借鉴 MihomoPro）
# 局域网内可免密访问，防止外部通过代理端口绕过认证
authentication:
  - "kelvin:Kv@9x#mP2$wL7qR!"   # 用户名:密码，与 secret 保持一致的强度
skip-auth-prefixes:
  - 127.0.0.1/8
  - 192.168.2.0/24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
  mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/lite/Country.mmdb
  geosite: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb

geodata-mode: true
geo-auto-update: true
geo-update-interval: 24

# ========================
# 终极优化版 DNS 设置 (纯净公共 DNS 版)
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  # 【起动机 DNS】：纯 IP 格式，仅用于解析下方 DoH 链接本身的域名
  # 旁路由环境下只用国内 DNS 引导，避免境外 IP 被污染或超时
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 【解析代理节点 IP 的 DNS】：防止节点域名被污染倒在起点
  proxy-server-nameserver:         
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # ==========================================
  # 【第一层：精准定向 (Nameserver-Policy)】
  # 已知域名直接发往对应 DNS，极速出结果，不占用下方未知池的资源
  # ==========================================
  nameserver-policy:
    "geosite:cn,private": 
      - 112.4.0.55
      - 221.131.143.69
      #- https://dns.alidns.com/dns-query
      #- https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - https://dns.google/dns-query         # 替换为 Google DoH
      - https://cloudflare-dns.com/dns-query # 替换为 Cloudflare DoH
 #==========================================
  # 【第二层：未知域名处理池 (核心解答)】
  # 只有当域名不在上述 geosite 列表里时，才会走到这里
  #==========================================
  
  # 主力查询（先问国内）：如果是国内未被收录的新域名，立刻拿到 CDN 极速 IP
  nameserver:
    - 112.4.0.55
    - 221.131.143.69
    #- https://dns.alidns.com/dns-query
    #- https://doh.pub/dns-query
    #- https://dns.google/dns-query   # 兜底：境外节点域名国内 DNS 无记录时使用
    
  # 备用查询（防污染）：国内返回假 IP 时，采用此处的真实返回结果
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns.quad9.net/dns-query      # 增加 Quad9 作为稳健兜底

  # 【核心裁判】：判断未知域名到底该用国内还是国外 DNS 的结果
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite: [gfw]
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.0/8
      # 建议增加以下防污染网段
      - ::1/128
      - fc00::/7
      - fe80::/10
      
  # ==========================================
  # 【Fake-IP 过滤】
  # ==========================================
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    # --- 微信/腾讯 ---
    - '+.weixin.com'
    - '+.wechat.com'
    - '+.qq.com'
    - '+.tencent.com'
    # --- 新增：抖音核心域名 ---
    - '+.amemv.com'
    - '+.douyinvod.com'
    - '+.snssdk.com'
    - '+.douyin.com'
    # --- 新增：小红书核心域名 ---
    - '+.xiaohongshu.com'
    - '+.xhscdn.com'
    # ------------------------------------
    - 'rule-set:oc-cn-domain'
    - 'rule-set:Private'
    
# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: true
  auto-detect-interface: true
  auto-redirect: true
  strict-route: true

profile:
  store-selected: true
  store-fake-ip: true
  
# ========================
# 策略组起始部分
# ========================
default: &default
  type: select
  proxies: 
    - 🚀 默认代理 
    - 香港-故转
    - 日本-故转
    - 美国-故转
    - 台湾-故转
    - 新加坡-故转
    - 其他-故转
    - 所有-自动
    - 所有-手动
    - 直连

proxy-groups:
  # --- 默认代理总控：改为 fallback 类型 ---
  - name: 🚀 默认代理
    type: select
    proxies:
      - 香港-故转
      - 日本-故转
      - 美国-故转
      - 台湾-故转
      - 新加坡-故转
      - 其他-故转
      - 所有-自动
      - 所有-手动
      - 直连
      
  # ============================================
  # 第一梯队：日常高频手动切换的 App / 场景组 (前台展示)
  # ============================================
  - {name: Speedtest, <<: *default} 
  - {name: AI, <<: *default}
  - {name: Google, <<: *default}
  - {name: YouTube, <<: *default}
  - {name: Telegram, <<: *default}
  - {name: Twitter(X), <<: *default}
  - {name: GitHub, <<: *default}
  - {name: Crypto, <<: *default}
  - {name: Emby, <<: *default}
  - {name: Meta, <<: *default}
  - {name: Stream Media, <<: *default}
  - {name: PayPal, <<: *default}
  - {name: Apple, <<: *default}
  - {name: Microsoft, <<: *default}
  - {name: Steam, <<: *default}
  - {name: Game, <<: *default}
  - {name: 国外, <<: *default}
  - {name: 兜底, <<: *default}
         
  # ============================================
  # 地区强主备策略 (Kelvin 极简定制版)
  # ============================================

  # --- 香港 ---
  - name: 香港-故转
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: false
    proxies: [香港-优选, 香港-备选]

  - name: 香港-优选
    type: load-balance
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    strategy: consistent-hashing  # <--- 极其关键：防止同一网站疯狂跳 IP
    use: *Primary      # <--- 依然自动读取总控台的主力机场
    filter: "(?i)(港|HK|Hong)"

  - name: 香港-备选
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    use: *Backup       # <--- 自动读取总控台的备用机场
    filter: "(?i)(港|HK|Hong)"

# --- 日本 ---
  - name: 日本-故转
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: false
    proxies: [日本-优选, 日本-备选]

  - name: 日本-优选
    type: load-balance
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    strategy: consistent-hashing  # <--- 极其关键：防止同一网站疯狂跳 IP
    use: *Primary      # <--- 依然自动读取总控台的主力机场
    filter: "(?i)(日本|JP|Japan|东京|大阪)"

  - name: 日本-备选
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    use: *Backup
    filter: "(?i)(日本|JP|Japan|东京|大阪)"
 
  # --- 美国 ---
  - name: 美国-故转
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: false
    proxies: [美国-优选, 美国-备选]

  - name: 美国-优选
    type: load-balance
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    strategy: consistent-hashing  # <--- 极其关键：防止同一网站疯狂跳 IP
    use: *Primary
    filter: "(?i)(美国|United States|US(?!A))"

  - name: 美国-备选
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    use: *Backup
    filter: "(?i)(美国|United States|US(?!A))"

  # --- 台湾 ---
  - name: 台湾-故转
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: false
    proxies: [台湾-优选, 台湾-备选]

  - name: 台湾-优选
    type: load-balance
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    strategy: consistent-hashing  # <--- 极其关键：防止同一网站疯狂跳 IP
    use: *Primary      # <--- 同样自动读取
    filter: "(?i)(台|TW|Tai)"

  - name: 台湾-备选
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    use: *Backup       # <--- 同样自动读取
    filter: "(?i)(台|TW|Tai)"

  # --- 新加坡 ---
  - name: 新加坡-故转
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: false
    proxies: [新加坡-优选, 新加坡-备选]

  - name: 新加坡-优选
    type: load-balance
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    strategy: consistent-hashing  # <--- 极其关键：防止同一网站疯狂跳 IP
    use: *Primary
    filter: "(?i)(新加坡|SG|Singapore|狮城)"

  - name: 新加坡-备选
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    use: *Backup
    filter: "(?i)(新加坡|SG|Singapore|狮城)"

   # --- 其他 ---
  - name: 其他-故转
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: false
    proxies: [其他-优选, 其他-备选]
    
  - name: 其他-优选
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    use: *Primary
    filter: "^(?!.*(?:港|Hong Kong|HK|台|Taiwan|TW|日本|Japan|JP|新加坡|SG|Singapore|美国|United States|US|直连|拒绝)).*"
    
  - name: 其他-备选
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    use: *Backup
    filter: "^(?!.*(?:港|Hong Kong|HK|台|Taiwan|TW|日本|Japan|JP|新加坡|SG|Singapore|美国|United States|US|直连|拒绝)).*"   

  # --- 全局总控 ---
  - name: 所有-自动
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 100
    use: [灵魂云, PolYun, 猫耳云]
    filter: "^(?!.*(?:直连|拒绝))"
      
  - name: 所有-手动
    type: select
    include-all: true
    filter: "^(?!.*(?:直连|拒绝))"
    
# ========================
