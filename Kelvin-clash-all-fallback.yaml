# ========================
# 规则集 (保持链接)
# ========================
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

rule-providers:
  # 文本格式列表
  TEST: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/kelvinpwf/clash/refs/heads/main/test.list"}
  AppleAI: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/kelvinpwf/clash/refs/heads/main/appleai.list"}
  Crypto: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Crypto/Crypto.list"}
  Copilot: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Copilot.list"}
  Grok: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Grok.list"} 
  Gemini: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/classical/google-gemini.list"}
  Custom_Direct: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Direct.list"}
  zhilian: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/kelvinpwf/clash/refs/heads/main/direct-clash.list"}
  oversea: {<<: *class, url: "https://gh-proxy.org/raw.githubusercontent.com/kelvinpwf/clash/refs/heads/main/proxy.list"}
